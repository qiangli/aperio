<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aperio — Trace Diff Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

    #topbar { background: #16213e; padding: 10px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
    #topbar h1 { font-size: 16px; color: #e94560; font-weight: 600; }
    #topbar .meta { font-size: 12px; color: #888; }

    #main { display: flex; flex: 1; overflow: hidden; }
    .trace-panel { flex: 1; overflow-y: auto; padding: 12px; border-right: 1px solid #0f3460; }
    .trace-panel:last-child { border-right: none; }
    .trace-panel h2 { font-size: 13px; color: #e94560; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }

    .span-row { padding: 6px 10px; margin: 2px 0; border-radius: 4px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 8px; }
    .span-row:hover { opacity: 0.9; }
    .span-row.matched { background: #1a3a2a; border-left: 3px solid #40aa60; }
    .span-row.missing { background: #3a1a1a; border-left: 3px solid #cc4040; }
    .span-row.diverged { background: #3a3a1a; border-left: 3px solid #ccaa40; }
    .span-row.selected { outline: 2px solid #e94560; }

    .span-type { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 3px; background: #0f3460; color: #aaa; min-width: 60px; text-align: center; }
    .span-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .span-dur { font-size: 11px; color: #888; min-width: 50px; text-align: right; }

    #diff-summary { background: #16213e; border-top: 1px solid #0f3460; padding: 10px 20px; flex-shrink: 0; }
    #diff-summary .stats { display: flex; gap: 20px; font-size: 12px; }
    .stat-matched { color: #40aa60; }
    .stat-missing { color: #cc4040; }
    .stat-diverged { color: #ccaa40; }

    .legend { display: flex; gap: 16px; margin-left: auto; font-size: 11px; }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-color { width: 12px; height: 12px; border-radius: 2px; }
  </style>
</head>
<body>

<div id="topbar">
  <h1>APERIO DIFF</h1>
  <div class="meta">Side-by-side trace comparison</div>
  <div class="legend">
    <div class="legend-item"><div class="legend-color" style="background:#40aa60"></div> Matched</div>
    <div class="legend-item"><div class="legend-color" style="background:#cc4040"></div> Missing</div>
    <div class="legend-item"><div class="legend-color" style="background:#ccaa40"></div> Diverged</div>
  </div>
</div>

<div id="main">
  <div class="trace-panel" id="left-panel">
    <h2>Left Trace</h2>
    <div id="left-spans"></div>
  </div>
  <div class="trace-panel" id="right-panel">
    <h2>Right Trace</h2>
    <div id="right-spans"></div>
  </div>
</div>

<div id="diff-summary">
  <div class="stats" id="diff-stats"></div>
</div>

<script>
  const leftTrace = "__LEFT_TRACE__";
  const rightTrace = "__RIGHT_TRACE__";
  const diffData = "__DIFF_DATA__";

  // Build span status maps from diff data
  const missingSpanIDs = new Set();
  const divergedSpanIDs = new Set();
  const divergedFields = {};

  diffData.forEach(d => {
    if (d.Type === 'missing' && d.SpanID) missingSpanIDs.add(d.SpanID);
    if (d.Type === 'extra' && d.SpanID) missingSpanIDs.add(d.SpanID);
    if (d.Type === 'changed' && d.SpanID) {
      divergedSpanIDs.add(d.SpanID);
      divergedFields[d.SpanID] = d.Message;
    }
  });

  function getSpanClass(span, isLeft) {
    if (missingSpanIDs.has(span.id)) return 'missing';
    if (divergedSpanIDs.has(span.id)) return 'diverged';
    return 'matched';
  }

  function formatDuration(span) {
    if (!span.start_time || !span.end_time) return '';
    const dur = new Date(span.end_time) - new Date(span.start_time);
    return dur + 'ms';
  }

  function escapeHtml(s) {
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  function renderSpans(container, trace, isLeft) {
    let html = '';
    trace.spans.forEach(span => {
      const cls = getSpanClass(span, isLeft);
      const dur = formatDuration(span);
      const name = span.name || span.id;
      html += `<div class="span-row ${cls}" data-id="${span.id}" title="${escapeHtml(divergedFields[span.id] || '')}">`;
      html += `<span class="span-type">${span.type}</span>`;
      html += `<span class="span-name">${escapeHtml(name)}</span>`;
      html += `<span class="span-dur">${dur}</span>`;
      html += '</div>';
    });
    container.innerHTML = html;
  }

  renderSpans(document.getElementById('left-spans'), leftTrace, true);
  renderSpans(document.getElementById('right-spans'), rightTrace, false);

  // Summary stats
  const matched = leftTrace.spans.length + rightTrace.spans.length - missingSpanIDs.size - divergedSpanIDs.size;
  document.getElementById('diff-stats').innerHTML =
    `<span class="stat-matched">Matched: ${Math.max(0, matched)}</span>` +
    `<span class="stat-missing">Missing/Extra: ${missingSpanIDs.size}</span>` +
    `<span class="stat-diverged">Diverged: ${divergedSpanIDs.size}</span>` +
    `<span style="color:#888">Total diffs: ${diffData.length}</span>`;

  // Click to highlight matching span in other panel
  document.querySelectorAll('.span-row').forEach(row => {
    row.addEventListener('click', function() {
      document.querySelectorAll('.span-row.selected').forEach(r => r.classList.remove('selected'));
      this.classList.add('selected');
      const id = this.dataset.id;
      // Highlight same ID in other panel
      const other = document.querySelector(`.trace-panel:not(:has(.span-row.selected)) .span-row[data-id="${id}"]`) ||
                    document.querySelectorAll(`.span-row[data-id="${id}"]`);
      if (other.forEach) {
        other.forEach(r => r.classList.add('selected'));
      } else if (other.classList) {
        other.classList.add('selected');
      }
    });
  });
</script>

</body>
</html>
